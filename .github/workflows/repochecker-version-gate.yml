name: Repochecker Version Gate

# Live-Check der `recommendedJsControllerVersion` / `recommendedAdminVersion`
# aus dem ioBroker.repochecker-Master gegen die im io-package.json deklarierten
# Min-Versionen. Failed bei Drift oder wenn der Source-Format sich geĂ¤ndert hat.
#
# ErgĂ¤nzt das lokale before_commit-Audit (`audit-krobi-consistency.py`) um einen
# CI-side Gate, der auch bei manuellen Tag-Pushes oder Recovery-Flows greift.

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repochecker-version-gate:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify io-package.json against repochecker recommended versions
        run: |
          set -euo pipefail

          curl -fsSL --max-time 30 \
            https://raw.githubusercontent.com/ioBroker/ioBroker.repochecker/master/lib/M1000_IOPackageJson.js \
            -o /tmp/m1000.js

          JS_REC=$(grep -oE "recommendedJsControllerVersion[[:space:]]*=[[:space:]]*'[^']+'" /tmp/m1000.js \
                   | head -1 | sed -E "s/.*'([^']+)'.*/\1/")
          ADMIN_REC=$(grep -oE "recommendedAdminVersion[[:space:]]*=[[:space:]]*'[^']+'" /tmp/m1000.js \
                      | head -1 | sed -E "s/.*'([^']+)'.*/\1/")

          if [ -z "${JS_REC}" ] || [ -z "${ADMIN_REC}" ]; then
            echo "::error ::Repochecker source format changed â€” could not parse recommended versions from M1000_IOPackageJson.js. Update workflow regex."
            exit 1
          fi

          echo "Repochecker recommends: js-controller >=${JS_REC}, admin >=${ADMIN_REC}"

          IOPACKAGE_JS=$(jq -r '
            (.common.dependencies // [])
            | map(select(.["js-controller"]))
            | first
            | .["js-controller"] // ""' io-package.json)
          IOPACKAGE_ADMIN=$(jq -r '
            (.common.globalDependencies // [])
            | map(select(.admin))
            | first
            | .admin // ""' io-package.json)

          echo "Adapter declares:        js-controller=${IOPACKAGE_JS}, admin=${IOPACKAGE_ADMIN}"

          EXPECTED_JS=">=${JS_REC}"
          EXPECTED_ADMIN=">=${ADMIN_REC}"
          FAIL=0

          if [ "${IOPACKAGE_JS}" != "${EXPECTED_JS}" ]; then
            echo "::error ::Drift: io-package.json js-controller=${IOPACKAGE_JS}, expected ${EXPECTED_JS} (recommendedJsControllerVersion)"
            FAIL=1
          fi
          if [ "${IOPACKAGE_ADMIN}" != "${EXPECTED_ADMIN}" ]; then
            echo "::error ::Drift: io-package.json admin=${IOPACKAGE_ADMIN}, expected ${EXPECTED_ADMIN} (recommendedAdminVersion)"
            FAIL=1
          fi

          if [ "${FAIL}" -eq 1 ]; then
            echo ""
            echo "Source: https://github.com/ioBroker/ioBroker.repochecker/blob/master/lib/M1000_IOPackageJson.js"
            echo "Fix: bump io-package.json common.dependencies.js-controller and/or common.globalDependencies.admin to the recommended values."
            exit 1
          fi

          echo "âś“ io-package.json synced with repochecker recommended versions"
