name: Test and Release

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-**
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: ioBroker/testing-action-check@v2.0.0
        with:
          node-version: "20.x"
          type-checking: true
          lint: true

  repochecker-version-gate:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify io-package.json against repochecker recommended versions
        run: |
          set -euo pipefail
          curl -fsSL --max-time 30 \
            https://raw.githubusercontent.com/ioBroker/ioBroker.repochecker/master/lib/M1000_IOPackageJson.js \
            -o /tmp/m1000.js
          JS_REC=$(grep -oE "recommendedJsControllerVersion[[:space:]]*=[[:space:]]*'[^']+'" /tmp/m1000.js \
                   | head -1 | sed -E "s/.*'([^']+)'.*/\1/")
          ADMIN_REC=$(grep -oE "recommendedAdminVersion[[:space:]]*=[[:space:]]*'[^']+'" /tmp/m1000.js \
                      | head -1 | sed -E "s/.*'([^']+)'.*/\1/")
          if [ -z "${JS_REC}" ] || [ -z "${ADMIN_REC}" ]; then
            echo "::error ::Repochecker source format changed — could not parse recommended versions from M1000_IOPackageJson.js. Update workflow regex."
            exit 1
          fi
          echo "Repochecker recommends: js-controller >=${JS_REC}, admin >=${ADMIN_REC}"
          IOPACKAGE_JS=$(jq -r '(.common.dependencies // []) | map(select(.["js-controller"])) | first | .["js-controller"] // ""' io-package.json)
          IOPACKAGE_ADMIN=$(jq -r '(.common.globalDependencies // []) | map(select(.admin)) | first | .admin // ""' io-package.json)
          echo "Adapter declares:        js-controller=${IOPACKAGE_JS}, admin=${IOPACKAGE_ADMIN}"
          EXPECTED_JS=">=${JS_REC}"
          EXPECTED_ADMIN=">=${ADMIN_REC}"
          FAIL=0
          if [ "${IOPACKAGE_JS}" != "${EXPECTED_JS}" ]; then
            echo "::error ::Drift: io-package.json js-controller=${IOPACKAGE_JS}, expected ${EXPECTED_JS} (recommendedJsControllerVersion)"
            FAIL=1
          fi
          if [ "${IOPACKAGE_ADMIN}" != "${EXPECTED_ADMIN}" ]; then
            echo "::error ::Drift: io-package.json admin=${IOPACKAGE_ADMIN}, expected ${EXPECTED_ADMIN} (recommendedAdminVersion)"
            FAIL=1
          fi
          if [ "${FAIL}" -eq 1 ]; then
            echo ""
            echo "Source: https://github.com/ioBroker/ioBroker.repochecker/blob/master/lib/M1000_IOPackageJson.js"
            exit 1
          fi
          echo "✓ io-package.json synced with repochecker recommended versions"

  adapter-tests:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    needs: [check-and-lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Run tests
        uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          build: true

  deploy:
    needs: [check-and-lint, adapter-tests, repochecker-version-gate]
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: "20.x"
          build: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
